<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Puzzle</title>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #140021;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #22003a;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 0 20px rgba(255, 154, 213, 0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #ff9ad5;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🧠 وقت الالغاز </h2>

  <p>كم وقت استغرق انشاء هذا الموقع ؟</p>

  <input type="text" id="answer" placeholder="الجواب ">
  <button onclick="check()">Submit</button>

  <p id="msg"></p>
</div>

<script>
function check() {
  const answer = document.getElementById("answer").value.toLowerCase();

  if (answer === "keyboard") {
    window.location.href = "home.html";
  } else {
    document.getElementById("msg").innerText = "❌ ليتك راقد";
  }
}
</script>

</body>
</html>
