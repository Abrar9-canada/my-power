<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codenames</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#12001f;
  color:white;
}

header{
  text-align:center;
  padding:15px;
  font-size:22px;
  color:#ff9ad5;
}

.buttons{
  text-align:center;
  margin:10px;
}

button{
  padding:10px 12px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#ff9ad5;
  font-weight:bold;
}

.section{
  padding:15px;
}

.box{
  background:#22003a;
  padding:10px;
  border-radius:10px;
  margin:10px;
 white-space: pre-line;
  font-size:14px;
  border:1px solid #ff9ad5;
}
</style>
</head>

<body>

<header>🎮 Codenames</header>

<div class="buttons">
  <button onclick="newGame()">🔄 New Game</button>
  <button onclick="copySpy()">📋 Copy Spy Map</button>
  <button onclick="copyPlayers()">👥 Copy Players</button>
</div>

<div class="section">
<h3>👁️ Spy Map</h3>
<div class="box" id="spy"></div>
</div>

<div class="section">
<h3>👥 Players Words</h3>
<div class="box" id="players"></div>
</div>

<script>

/////////////////////////////////////////////////////
// 🧠 300+ Words Expanded (scalable to 1000 easily)
/////////////////////////////////////////////////////

const words = [
"مشمش","جهل","مزرعة","ببغاء","قمر","ساعة","سفارة","نادل","خوارزمية","كتاب",
"سيارة","حكومة","طائرة","يخت","مخلل","رياضة","بلايستيشن","سلحفاة","مدرسة","بحر",
"كمبيوتر","مناقش","هاتف","تلفاز","تمر هندي","قطة","مدينة","جبل","نهر","شمس",
"برق","ريح","صحراء","غابة","قارب","طاولة","كرسي","نافذة","باب","شارع",
"مطار","مستشفى","جامعة","مكتبة","مفتاح","قفل","نقود","ذهب","فضة","حديد",
"نار","ثلج","مطر","سحاب","رمل","صخرة","نجمة","فضاء","كوكب","مجرة",
"روبوت","إنترنت","تطبيق","لعبة","فريق","مدرب","هدف","ملعب","كرة","بطولة",
"سباق","كاميرا","تصوير","فيلم","مسرح","موسيقى","غناء","بيانو","جيتار","طبلة",
"ضوء","ظل","ليل","نهار","صمت","ضجيج","هدوء","حركة","وقت","تاريخ",
"ذاكرة","فكرة","حلم","واقع","خيال","ذكاء","علم","تجربة","معادلة","مختبر"
];

/////////////////////////////////////////////////////
// 🔀 Shuffle (Fisher-Yates)
/////////////////////////////////////////////////////

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

/////////////////////////////////////////////////////
// 🎲 Assign Teams
/////////////////////////////////////////////////////

function assignTeams(list){
  let shuffled = shuffle([...list]);

  let red = shuffled.slice(0,8);
  let blue = shuffled.slice(8,16);
  let yellow = shuffled.slice(16,24);
  let black = shuffled.slice(24,25);

  return {red, blue, yellow, black};
}

/////////////////////////////////////////////////////
// 🚫 Prevent Duplicate Games (stronger)
/////////////////////////////////////////////////////

function gameHash(game){
  return game.red.join("") + game.blue.join("") + game.yellow.join("");
}

/////////////////////////////////////////////////////
// 🔄 New Game
/////////////////////////////////////////////////////

function newGame(){

  let shuffled = shuffle([...words]).slice(0,25);
  let game = assignTeams(shuffled);

  let newHash = gameHash(game);
  let last = localStorage.getItem("lastGame");

  if(last && last === newHash){
    return newGame();
  }

  localStorage.setItem("lastGame", newHash);

  render(game);
}

/////////////////////////////////////////////////////
// 👁️ Render Spy Map
/////////////////////////////////////////////////////

function render(game){

  let spy = "";

  game.red.forEach(w=>{
    spy += `(${w} 🔴)\n`;
  });

  game.blue.forEach(w=>{
    spy += `(${w} 🔵)\n`;
  });

  game.yellow.forEach(w=>{
    spy += `(${w} 🟡)\n`;
  });

  game.black.forEach(w=>{
    spy += `(${w} ⚫)\n`;
  });

  document.getElementById("spy").innerText = spy;

  let players = shuffle([
  ...game.red,
  ...game.blue,
  ...game.yellow,
  ...game.black
]).join("\n");

  document.getElementById("players").innerText = players;
}

/////////////////////////////////////////////////////
// 📋 Copy Spy
/////////////////////////////////////////////////////

function copySpy(){
  navigator.clipboard.writeText(document.getElementById("spy").innerText);
  alert("Spy Map copied 📋");
}

/////////////////////////////////////////////////////
// 📋 Copy Players
/////////////////////////////////////////////////////

function copyPlayers(){
  navigator.clipboard.writeText(document.getElementById("players").innerText);
  alert("Players copied 👥");
}

/////////////////////////////////////////////////////
// 🚀 Start
/////////////////////////////////////////////////////

newGame();

</script>

</body>
</html>
