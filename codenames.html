<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codenames Admin Board</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#12001f;
  color:white;
}

header{
  text-align:center;
  padding:15px;
  font-size:22px;
  color:#ff9ad5;
}

.buttons{
  text-align:center;
  margin:10px;
}

button{
  padding:10px 12px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#ff9ad5;
  font-weight:bold;
}

.section{
  padding:15px;
}

.box{
  background:#22003a;
  padding:10px;
  border-radius:10px;
  margin:10px;
  white-space:pre-wrap;
  font-size:14px;
  border:1px solid #ff9ad5;
}
</style>
</head>

<body>

<header>🎮 Codenames Admin Board</header>

<div class="buttons">
  <button onclick="newGame()">🔄 New Game</button>
  <button onclick="copySpy()">📋 Copy Spy Map</button>
  <button onclick="copyPlayers()">👥 Copy Players</button>
</div>

<div class="section">
<h3>👁️ Spy Map</h3>
<div class="box" id="spy"></div>
</div>

<div class="section">
<h3>👥 Players Words</h3>
<div class="box" id="players"></div>
</div>

<script>

// 🔥 كلمات الأساس
const words = [
"مشمش","جهل","مزرعة","ببغاء","قمر","ساعة","سفارة","نادل",
"خوارزمية","كتاب","سيارة","حكومة","طائرة","يخت","مخلل","رياضة",
"بلايستيشن","سلحفاة","مدرسة","بحر","كمبيوتر","مناقش","هاتف","تلفاز",
"تمر هندي","قطة","مدينة","جبل","نهر","شمس","قمر","برق"
];

// 🎲 توليد فرق عشوائية
function assignTeams(list){
  let shuffled = [...list].sort(()=>Math.random()-0.5);

  let red = shuffled.slice(0,8);
  let blue = shuffled.slice(8,16);
  let yellow = shuffled.slice(16,24);
  let black = shuffled.slice(24,25);

  return {red, blue, yellow, black};
}

// 🔄 New Game
function newGame(){

  let shuffled = [...words].sort(()=>Math.random()-0.5).slice(0,25);

  let game = assignTeams(shuffled);

  // 🚫 منع تكرار نفس اللعبة
  let last = localStorage.getItem("lastGame");

  if(last && last === JSON.stringify(game)){
    return newGame();
  }

  localStorage.setItem("lastGame", JSON.stringify(game));

  render(game);
}

// 👁️ Spy Map
function render(game){

  let spy = "";

  game.red.forEach(w=>{
    spy += `(${w} 🔴)\n`;
  });

  game.blue.forEach(w=>{
    spy += `(${w} 🔵)\n`;
  });

  game.yellow.forEach(w=>{
    spy += `(${w} 🟡)\n`;
  });

  game.black.forEach(w=>{
    spy += `(${w} ⚫)\n`;
  });

  document.getElementById("spy").innerText = spy;

  // 👥 Players Words
  let players = [
    ...game.red,
    ...game.blue,
    ...game.yellow,
    ...game.black
  ].join(" | ");

  document.getElementById("players").innerText = players;
}

// 📋 نسخ Spy Map
function copySpy(){
  navigator.clipboard.writeText(document.getElementById("spy").innerText);
  alert("Spy Map copied 📋");
}

// 📋 نسخ Players
function copyPlayers(){
  navigator.clipboard.writeText(document.getElementById("players").innerText);
  alert("Players copied 👥");
}

// 🚀 تشغيل أول مرة
newGame();

</script>

</body>
</html>
