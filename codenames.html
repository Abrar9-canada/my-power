<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Codenames</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f001a;
  color: white;
  text-align: center;
}

header {
  padding: 15px;
  background: #1f0033;
  color: #ff9ad5;
}

button {
  margin: 8px;
  padding: 10px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #ff9ad5;
}

.box {
  background: #1a002b;
  margin: 10px auto;
  padding: 10px;
  width: 90%;
  max-width: 800px;
  border-radius: 10px;
  white-space: pre-wrap;
  text-align: left;
}
</style>
</head>

<body>

<header>🎮 Codenames Admin Board</header>

<button onclick="newGame()">🔄 New Game</button>
<button onclick="copySpy()">📋 Copy Spy Map</button>
<button onclick="copyPlayers()">👥 Copy Players</button>

<h3>👁️ Spy Map</h3>
<div id="spy" class="box"></div>

<h3>👥 Players Words</h3>
<div id="players" class="box"></div>

<script>

// 🔥 ربط مع home page
const urlParams = new URLSearchParams(window.location.search);
let gameId = urlParams.get("id");

// إذا ما فيه نولد واحد
if (!gameId) gameId = Date.now() + Math.random();

const wordsPool = [
"جهل","ساعة","ببغاء","نادل","يخت","مزرعة","بلايستيشن","سلحفاة",
"رياضة","تمر هندي","مشمش","دلفين","تلفاز","آيفون","سفارة","بداية",
"قارب","مخلل","خوارزمية","حكومة","قطة","مناقش","برق","دلع",
"مدرسة","سيارة","قمر","بحر","كتاب","كمبيوتر","هاتف","طائرة"
];

let game = [];

// 🔥 seed ثابت
function mulberry(a) {
  return function() {
    a |= 0;
    a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function shuffle(arr, seed) {
  let a = [...arr];
  let rand = mulberry(seed);

  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}

function generate() {
  let shuffled = shuffle(wordsPool, gameId);
  let words = shuffled.slice(0, 25);

  game = words.map((w, i) => {
    let type;

    if (i < 8) type = "🔴";
    else if (i < 16) type = "🔵";
    else if (i < 24) type = "🟡";
    else type = "⚫";

    return { word: w, type };
  });

  render();
}

// 🔥 Spy map (بالألوان)
function renderSpy() {
  let out = "";

  for (let i = 0; i < game.length; i += 2) {
    let a = game[i];
    let b = game[i + 1];

    if (b) {
      out += `(${a.word} ${a.type} | ${b.word} ${b.type})\n`;
    } else {
      out += `(${a.word} ${a.type})\n`;
    }
  }

  document.getElementById("spy").innerText = out;
}

// 🔥 Player words (بدون ألوان)
function renderPlayers() {
  let out = game.map(c => c.word).join(" | ");
  document.getElementById("players").innerText = out;
}

function render() {
  renderSpy();
  renderPlayers();
}

// 🔥 نسخ الشارح
function copySpy() {
  navigator.clipboard.writeText(document.getElementById("spy").innerText);
  alert("Spy Map Copied!");
}

// 🔥 نسخ اللاعبين
function copyPlayers() {
  navigator.clipboard.writeText(document.getElementById("players").innerText);
  alert("Players Words Copied!");
}

// 🔥 لعبة جديدة (تغير كل شيء فعلياً)
function newGame() {
  gameId = Date.now() + Math.random();
  generate();
}

generate();

</script>

</body>
</html>
